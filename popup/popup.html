<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Runway 队列助手</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 380px;
      min-height: 500px;
      background: #1a1a2e;
      color: #eee;
      font-size: 14px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
      margin-top: 4px;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .section-title {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-text {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
    }

    .status-dot.running {
      background: #4ade80;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .toggle-btn {
      background: #4ade80;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn:hover {
      transform: scale(1.05);
    }

    .toggle-btn.stop {
      background: #f87171;
    }

    .input-area {
      background: #16162a;
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      color: #eee;
      font-family: inherit;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 80px;
    }

    textarea::placeholder {
      color: #666;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-secondary {
      background: #333;
      color: #ddd;
    }

    .btn:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .queue-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .queue-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px;
      background: #16162a;
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .queue-item.current {
      border: 1px solid #667eea;
    }

    .queue-item.completed {
      opacity: 0.6;
    }

    .queue-item.failed {
      border: 1px solid #f87171;
    }

    .queue-item-index {
      background: #333;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      flex-shrink: 0;
    }

    .queue-item-content {
      flex: 1;
      min-width: 0;
    }

    .queue-item-prompt {
      font-size: 13px;
      word-break: break-word;
      line-height: 1.4;
    }

    .queue-item-status {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }

    .queue-item-status.completed {
      color: #4ade80;
    }

    .queue-item-status.failed {
      color: #f87171;
    }

    .queue-item-status.running {
      color: #fbbf24;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      padding: 4px;
      font-size: 16px;
    }

    .delete-btn:hover {
      color: #f87171;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: #666;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .settings-label {
      font-size: 13px;
    }

    .settings-input {
      width: 80px;
      padding: 6px 8px;
      background: #16162a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #eee;
      font-size: 13px;
      text-align: right;
    }

    .settings-input:focus {
      outline: none;
      border-color: #667eea;
    }

    .settings-unit {
      font-size: 12px;
      color: #888;
      margin-left: 4px;
    }

    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      line-height: 1.4;
    }

    .footer {
      padding: 12px 16px;
      text-align: center;
      font-size: 11px;
      color: #555;
    }

    /* 批量导入弹窗 */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      justify-content: center;
      align-items: flex-start;
      padding-top: 20px;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 12px;
      width: 90%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 16px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-header h2 { font-size: 16px; margin: 0; }

    .modal-close {
      background: none; border: none;
      color: #888; font-size: 20px; cursor: pointer;
    }
    .modal-close:hover { color: #f87171; }

    .modal-body {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-body label {
      font-size: 13px;
      color: #888;
    }

    .modal-body textarea {
      width: 100%;
      min-height: 180px;
      background: #16162a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #eee;
      font-family: inherit;
      font-size: 13px;
      padding: 12px;
      resize: vertical;
      outline: none;
    }
    .modal-body textarea:focus { border-color: #667eea; }

    .delimiter-row {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .delimiter-row input {
      flex: 1;
      padding: 8px 12px;
      background: #16162a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      font-size: 13px;
      outline: none;
    }
    .delimiter-row input:focus { border-color: #667eea; }

    .delimiter-row .btn { flex: 0; padding: 8px 16px; }

    .preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .preview-list {
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #333;
      border-radius: 8px;
      background: #16162a;
    }

    .preview-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
    }
    .preview-item:last-child { border-bottom: none; }

    .preview-index {
      background: #333;
      color: #888;
      padding: 2px 6px;
      border-radius: 8px;
      font-size: 10px;
      flex-shrink: 0;
    }

    .preview-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
    }

    .preview-count {
      font-size: 11px;
      color: #888;
    }

    .modal-footer {
      padding: 12px 16px;
      border-top: 1px solid #333;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🦞 Runway 队列助手</h1>
    <p>自动提交提示词到 Runway 生成</p>
  </div>

  <div class="section">
    <div class="status-bar">
      <div class="status-text">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">已停止</span>
      </div>
      <button class="toggle-btn" id="toggleBtn">开始</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">添加提示词</div>
    <div class="input-area">
      <textarea id="promptInput" placeholder="输入提示词，支持 @参考图片 语法..."></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="addBtn">添加到队列</button>
      <button class="btn btn-secondary" id="batchBtn">批量导入</button>
      <button class="btn btn-secondary" id="clearBtn">清空</button>
    </div>
    <div class="hint">
      提示：@文件名 会被处理为单独一行，适合绑定参考图片
    </div>
  </div>

  <div class="section">
    <div class="section-title">队列 (<span id="queueCount">0</span> 个任务)</div>
    <div class="queue-list" id="queueList">
      <div class="empty-state">
        队列为空，点击上方添加提示词
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">参数设置</div>
    <div class="settings-row">
      <span class="settings-label">检查间隔</span>
      <div>
        <input type="number" class="settings-input" id="checkInterval" value="150">
        <span class="settings-unit">秒</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">成功后延迟</span>
      <div>
        <input type="number" class="settings-input" id="successDelay" value="5">
        <span class="settings-unit">秒</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">随机延迟</span>
      <div>
        <input type="number" class="settings-input" id="randomDelay" value="5">
        <span class="settings-unit">秒</span>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">默认时长</span>
      <div>
        <select class="settings-input" id="defaultDuration" style="background: #16162a; border: 1px solid #333; border-radius: 4px; color: #eee; font-size: 13px; padding: 6px 8px;">
          <option value="">不设置</option>
          <option value="5s">5s</option>
          <option value="10s">10s</option>
          <option value="15s" selected>15s</option>
          <option value="20s">20s</option>
        </select>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label">测试模式</span>
      <div>
        <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
          <input type="checkbox" id="testMode" style="width: 16px; height: 16px;">
          <span style="font-size: 12px; color: #888;">不点击Generate按钮</span>
        </label>
      </div>
    </div>
    <div class="hint">测试模式：只输入提示词，不提交生成，方便测试 @参考图 绑定</div>
      适当增加延迟可降低被检测为自动化的风险
    </div>
  </div>

  <!-- 批量导入弹窗 -->
  <div class="modal-overlay" id="batchModal">
    <div class="modal">
      <div class="modal-header">
        <h2>批量导入</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <label>粘贴提示词（用分隔符区分每个任务）</label>
        <textarea id="batchInput" placeholder="任务 1&#10;洪桂萍 @hong&#10;唐思静 @tang&#10;---&#10;任务 2&#10;顾小诺 @tian&#10;顾城 @chen11&#10;---&#10;任务 3&#10;..."></textarea>
        <div class="delimiter-row">
          <label style="white-space: nowrap;">分隔符：</label>
          <input type="text" id="delimiter" value="====ssss====" placeholder="====ssss====">
          <button class="btn btn-primary" id="parseBtn" style="flex:0; padding:8px 16px;">解析</button>
        </div>
        <div class="preview-header">
          <span class="preview-count" id="previewCount">待解析</span>
        </div>
        <div class="preview-list" id="previewList">
          <div class="empty-state" style="padding:20px;">粘贴内容后点击「解析」预览</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalCancel">取消</button>
        <button class="btn btn-primary" id="modalConfirm" disabled>确认添加 (0)</button>
      </div>
    </div>
  </div>

  <div class="footer">
    Runway Queue Assistant v1.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
